name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy Assistant Hub
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download docker-compose
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: docker-compose
          path: .

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        run: |
          docker compose pull

      - name: Pull secrets from Infisical
        run: |
          if [ -n "${{ secrets.INFISICAL_TOKEN }}" ]; then
            curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
            sudo apt-get update && sudo apt-get install -y infisical
            infisical export --token="${{ secrets.INFISICAL_TOKEN }}" --env=${{ github.event.inputs.environment || 'production' }} --format=dotenv > .env
          fi

      - name: Start services
        run: |
          docker compose up -d

      - name: Verify health
        run: |
          sleep 10
          curl -f http://localhost:8000/health || exit 1

      - name: Build summary
        run: |
          echo "## 🚀 Deploy successful!" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY