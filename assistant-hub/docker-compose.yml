version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  wake_word_service:
    build:
      context: .
      dockerfile: Dockerfile.wakeword
    devices:
      - /dev/snd:/dev/snd
    environment:
      - BACKEND_TRIGGER_URL=http://backend:8000/trigger
    restart: unless-stopped

  webapp:
    build:
      context: ./webapp
    ports:
      - "3000:3000"
    restart: unless-stopped