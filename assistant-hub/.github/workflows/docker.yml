name: Build Docker Images

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-wakeword:
    name: Build Wake Word Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push wake word service
        uses: docker/build-push-action@v5
        with:
          context: ./wake_word_service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/wake-word:${{ github.sha }}
            ghcr.io/${{ github.repository }}/wake-word:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-webapp:
    name: Build Webapp Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Build webapp
        working-directory: webapp
        run: |
          pnpm install
          pnpm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push webapp
        uses: docker/build-push-action@v5
        with:
          context: ./webapp
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/webapp:${{ github.sha }}
            ghcr.io/${{ github.repository }}/webapp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose-build:
    name: Build Docker Compose Bundle
    runs-on: ubuntu-latest
    needs: [build-backend, build-wakeword, build-webapp]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update docker-compose.yml with new tags
        run: |
          sed -i 's|image: assistant-hub-backend|image: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}|g' docker-compose.yml
          sed -i 's|image: assistant-hub-wakeword|image: ghcr.io/${{ github.repository }}/wake-word:${{ github.sha }}|g' docker-compose.yml
          sed -i 's|image: assistant-hub-webapp|image: ghcr.io/${{ github.repository }}/webapp:${{ github.sha }}|g' docker-compose.yml

      - name: Upload docker-compose.yml artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose
          path: docker-compose.yml