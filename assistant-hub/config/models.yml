llm:
  default: "meta-llama/llama-3.1-8b-instruct:free"
  fallback: "google/gemma-2-9b-it:free"
  smart_home: "meta-llama/llama-3.1-8b-instruct:free"
  max_tokens: 300
  temperature: 0.7

stt:
  language: "id"
  provider: "minimax"
  model: "speech-2.6"

tts:
  provider: "minimax"
  voice_id: "Calm_Woman"
  model: "speech-2.6-turbo"
  endpoint: "https://api.minimax.io/v1/t2a_v2"

wake_word:
  model: "hey_mycroft"
  threshold: 0.5
  silence_chunks: 12
  max_record_seconds: 10